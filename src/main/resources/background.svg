<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" width="1280" height="720">

  <!-- Base background -->
  <rect width="1280" height="720" fill="#060D18"/>

  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="22" r="1.2" fill="#1E3A5F" opacity="0.75"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#dotgrid)"/>

  <!-- ===================== -->
  <!-- NETWORK LINES         -->
  <!-- ===================== -->

  <!-- Top route: node 1 -> 2 -> 3 -> 4 -> 5 -->
  <line x1="110" y1="215" x2="385" y2="310" stroke="#1A3A5C" stroke-width="1.2" opacity="0.6"/>
  <line x1="385" y1="310" x2="640" y2="170" stroke="#1A3A5C" stroke-width="1.2" opacity="0.6"/>
  <line x1="640" y1="170" x2="870" y2="345" stroke="#1A3A5C" stroke-width="1.2" opacity="0.6"/>
  <line x1="870" y1="345" x2="1140" y2="200" stroke="#1A3A5C" stroke-width="1.2" opacity="0.6"/>

  <!-- Bottom route: node 6 -> 7 -> 8 -> 9 -->
  <line x1="185" y1="565" x2="480" y2="490" stroke="#1A3A5C" stroke-width="1.2" opacity="0.5"/>
  <line x1="480" y1="490" x2="740" y2="560" stroke="#1A3A5C" stroke-width="1.2" opacity="0.5"/>
  <line x1="740" y1="560" x2="1010" y2="508" stroke="#1A3A5C" stroke-width="1.2" opacity="0.5"/>
  <line x1="1010" y1="508" x2="1190" y2="590" stroke="#1A3A5C" stroke-width="1.2" opacity="0.4"/>

  <!-- Vertical connectors between routes -->
  <line x1="385" y1="310" x2="480" y2="490" stroke="#1A3A5C" stroke-width="1" opacity="0.4"/>
  <line x1="640" y1="170" x2="480" y2="490" stroke="#1A3A5C" stroke-width="1" opacity="0.3"/>
  <line x1="870" y1="345" x2="740" y2="560" stroke="#1A3A5C" stroke-width="1" opacity="0.4"/>
  <line x1="870" y1="345" x2="1010" y2="508" stroke="#1A3A5C" stroke-width="1" opacity="0.35"/>
  <line x1="1140" y1="200" x2="1010" y2="508" stroke="#1A3A5C" stroke-width="1" opacity="0.4"/>
  <line x1="110"  y1="215" x2="185"  y2="565" stroke="#1A3A5C" stroke-width="1" opacity="0.3"/>

  <!-- ===================== -->
  <!-- NETWORK NODES         -->
  <!-- ===================== -->

  <!-- Standard nodes (dark with blue ring) -->
  <circle cx="110" cy="215" r="6" fill="#0A1825" stroke="#2A5280" stroke-width="1.5"/>
  <circle cx="110" cy="215" r="2.5" fill="#2A6AAF"/>

  <circle cx="640" cy="170" r="6" fill="#0A1825" stroke="#2A5280" stroke-width="1.5"/>
  <circle cx="640" cy="170" r="2.5" fill="#2A6AAF"/>

  <circle cx="1140" cy="200" r="6" fill="#0A1825" stroke="#2A5280" stroke-width="1.5"/>
  <circle cx="1140" cy="200" r="2.5" fill="#2A6AAF"/>

  <circle cx="185" cy="565" r="5" fill="#0A1825" stroke="#2A5280" stroke-width="1.5"/>
  <circle cx="185" cy="565" r="2" fill="#2A6AAF"/>

  <circle cx="1190" cy="590" r="5" fill="#0A1825" stroke="#2A5280" stroke-width="1.5"/>
  <circle cx="1190" cy="590" r="2" fill="#1E3A5F"/>

  <!-- Amber accent nodes (active/highlighted) -->
  <circle cx="385" cy="310" r="8" fill="#0A1825" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="385" cy="310" r="3.5" fill="#F59E0B"/>

  <circle cx="870" cy="345" r="8" fill="#0A1825" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="870" cy="345" r="3.5" fill="#F59E0B"/>

  <circle cx="480" cy="490" r="7" fill="#0A1825" stroke="#F59E0B" stroke-width="1.8"/>
  <circle cx="480" cy="490" r="3" fill="#F59E0B" opacity="0.8"/>

  <circle cx="740" cy="560" r="6" fill="#0A1825" stroke="#F59E0B" stroke-width="1.5"/>
  <circle cx="740" cy="560" r="2.5" fill="#F59E0B" opacity="0.7"/>

  <circle cx="1010" cy="508" r="6" fill="#0A1825" stroke="#2A5280" stroke-width="1.5"/>
  <circle cx="1010" cy="508" r="2.5" fill="#2A6AAF"/>

  <!-- ===================== -->
  <!-- RADAR RINGS — top right -->
  <!-- ===================== -->
  <circle cx="1220" cy="80" r="70"  fill="none" stroke="#1E3A5F" stroke-width="1"   opacity="0.45"/>
  <circle cx="1220" cy="80" r="120" fill="none" stroke="#1E3A5F" stroke-width="1"   opacity="0.28"/>
  <circle cx="1220" cy="80" r="170" fill="none" stroke="#1E3A5F" stroke-width="0.8" opacity="0.16"/>
  <circle cx="1220" cy="80" r="220" fill="none" stroke="#1E3A5F" stroke-width="0.8" opacity="0.10"/>
  <!-- Radar crosshair -->
  <line x1="1160" y1="80" x2="1280" y2="80" stroke="#1E3A5F" stroke-width="0.8" opacity="0.3"/>
  <line x1="1220" y1="20"  x2="1220" y2="140" stroke="#1E3A5F" stroke-width="0.8" opacity="0.3"/>
  <!-- Amber center dot -->
  <circle cx="1220" cy="80" r="5" fill="#0A1825" stroke="#F59E0B" stroke-width="1.5"/>
  <circle cx="1220" cy="80" r="2.5" fill="#F59E0B" opacity="0.7"/>

  <!-- ===================== -->
  <!-- HEX ACCENT — bottom left -->
  <!-- ===================== -->
  <!-- Hexagon constructed from a path: center ~(80, 650), r=55 -->
  <polygon points="80,595 128,622 128,678 80,705 32,678 32,622"
           fill="none" stroke="#1E3A5F" stroke-width="1" opacity="0.35"/>
  <polygon points="80,612 112,629 112,664 80,681 48,664 48,629"
           fill="none" stroke="#1E3A5F" stroke-width="0.8" opacity="0.22"/>
  <polygon points="80,628 100,639 100,661 80,672 60,661 60,639"
           fill="none" stroke="#1A3A5C" stroke-width="0.8" opacity="0.18"/>

  <!-- ===================== -->
  <!-- VIGNETTE: dark edge fade overlay (thin border inset rects) -->
  <!-- ===================== -->
  <rect x="0"   y="0"   width="1280" height="80"  fill="#060D18" opacity="0.55"/>
  <rect x="0"   y="640" width="1280" height="80"  fill="#060D18" opacity="0.55"/>
  <rect x="0"   y="0"   width="80"   height="720" fill="#060D18" opacity="0.35"/>
  <rect x="1200" y="0"  width="80"   height="720" fill="#060D18" opacity="0.35"/>

</svg>
